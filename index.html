<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Acorn Tools — Free private PDF & image tools. Compress, convert, resize, crop, merge — 100% offline, nothing leaves your device." />

    <meta property="og:title" content="Acorn Tools — Private PDF & Image Tools" />
    <meta property="og:description" content="Free private PDF & image tools. Compress, convert, resize, crop, merge — 100% offline, nothing leaves your device." />
    <meta property="og:image" content="/social-preview.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.acorntools.net" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Acorn Tools — Private PDF & Image Tools" />
    <meta name="twitter:description" content="Free private PDF & image tools — nothing leaves your device." />
    <meta name="twitter:image" content="https://www.acorntools.net/social-preview.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>Acorn Tools — Private PDF & Image Tools</title>

    <style>
      /* Critical CSS — prevents flash of unstyled content */
      :root { --at-bg: #0a0a0b; --at-text: #e8e6e3; }
      [data-theme="light"] { --at-bg: #f7f7f8; --at-text: #1a1a1d; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: var(--at-bg);
        color: var(--at-text);
        font-family: system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh;
      }
    </style>
    <script>
      // Apply theme before render to prevent flash
      (function(){
        var t = localStorage.getItem('acorntools-theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
        if (t === 'light') document.querySelector('meta[name="theme-color"]').content = '#f7f7f8';
      })();
      // Auto-reload when a new service worker takes control
      // This handles the case where skipWaiting() activates a new SW
      // while the old one was serving stale content
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (!window.__swReloading) {
            window.__swReloading = true;
            location.reload();
          }
        });
        // Also force-check for SW updates immediately
        navigator.serviceWorker.ready.then(function(reg) {
          reg.update();
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
